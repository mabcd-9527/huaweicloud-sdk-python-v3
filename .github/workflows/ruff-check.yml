name: Ruff Check
permissions:
  contents: read
on:
  workflow_dispatch:
jobs:
  publish:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: '3.10'
    - name: Check
      run: |
        python -m pip install --upgrade pip
        pip install ruff
        ruff check .
